<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="dist/index.css" />
    <link rel="icon" href="assets/logo_png.ico" type="image/x-icon" />
    <title>Modding Guild</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header__wrapper">
          <nav class="header__nav nav">
            <ul class="header__nav-list">
              <li class="header__nav-item">
                <img
                  src="assets/webp/logo_png.webp"
                  alt="logo"
                  class="nav__logo nav__item"
                />
              </li>
              <li class="header__nav-item nav__item">
                <a href="#" class="header__nav-item-link">Главная</a>
              </li>
              <li class="header__nav-item nav__item">
                <a href="#" class="header__nav-item-link">Руководство</a>
              </li>
            </ul>

            <ul class="header__nav-list-right">
              <li class="header__nav-item nav__item">
                <a href="#" class="header__nav-item-link">Изменения</a>
              </li>
              <li class="header__nav-item nav__item">
                <a href="#" class="header__nav-item-link">Контакты</a>
              </li>
              <!-- Добавьте дополнительные элементы по необходимости -->
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="hero">
        <div class="container">
          <div class="hero__wrapper">
            <div class="hero__content">
              <h1 class="hero__title">
                The Elder Scrolls V: Skyrim Anniversary Edition
              </h1>
              <p class="hero__description">
                Огромное руководство по моддингу Скайрима во всех его аспектах.
              </p>
              <div class="hero__buttons">
                <button
                  type="button"
                  class="hero__button hero__button-start button"
                >
                  <a href="pages/introduction.html">Начать</a>
                </button>
                <button
                  type="button"
                  class="hero__button hero__button-youtube button"
                >
                  <a href="#">YouTube</a>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="gallery">
        <div class="gallery__wrapper">
          <!-- Трек с изображениями -->
          <div class="gallery__track">
            <div class="gallery__slide">
              <img
                src="/assets/webp/test-1.jpg"
                alt="Image 1"
                class="gallery__image"
              />
            </div>
            <div class="gallery__slide">
              <img
                src="/assets/webp/test-2.jpg"
                alt="Image 2"
                class="gallery__image"
              />
            </div>
            <div class="gallery__slide">
              <img
                src="/assets/webp/test-3.jpg"
                alt="Image 3"
                class="gallery__image"
              />
            </div>
            <!-- Добавьте дополнительные слайды по необходимости -->
          </div>
        </div>
      </section>
	  <section class="applications"></section>
    </main>
    <script src="scripts/script.js"></script>
  </body>
</html>
